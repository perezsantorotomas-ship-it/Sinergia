<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Proxy window to catch who's trying to set fetch
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(val) { 
              console.warn('Attempt to overwrite fetch detected from:', new Error().stack);
              // Do nothing, just prevent the crash if it was a property assignment
              // Note: This might still throw if the property is not configurable
            },
            configurable: true
          });
        } catch (e) {
          console.error('Migration notice: window.fetch is read-only. Some library might be trying to polyfill it unnecessarily.', e);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
